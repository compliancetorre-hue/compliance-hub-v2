<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Hub - Login</title>
  <!-- SEGURANCA: Content Security Policy impede XSS -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://localhost:3001;">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <span class="logo-icon">🛡️</span>
        <h1>Compliance Hub</h1>
        <p>Sistema de Gestao</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="username"
            placeholder="seu@email.com" required>
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-group">
            <input type="password" id="senha" name="senha" autocomplete="current-password"
              placeholder="••••••••" required>
            <button type="button" id="toggle-senha" class="input-addon" title="Mostrar senha">
              <span>👁</span>
            </button>
          </div>
          <span class="field-error" id="senha-error"></span>
        </div>

        <div id="login-error" class="alert alert-danger" style="display:none"></div>

        <button type="submit" id="btn-login" class="btn btn-primary btn-full">
          <span id="btn-text">Entrar</span>
          <span id="btn-loading" style="display:none">Aguarde...</span>
        </button>
      </form>

      <p class="login-footer">
        Problemas com acesso? Contate o administrador do sistema.
      </p>
    </div>
  </div>

  <!-- SEGURANCA: Scripts separados, sem inline JS -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Verificar se ja esta logado
    if (Auth.isAuthenticated()) {
      window.location.href = 'app.html';
    }

    // Formulario de login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btnText = document.getElementById('btn-text');
      const btnLoading = document.getElementById('btn-loading');
      const errorDiv = document.getElementById('login-error');

      // Limpar erros
      errorDiv.style.display = 'none';
      btnText.style.display = 'none';
      btnLoading.style.display = 'inline';

      try {
        await Auth.login(email, senha);
        window.location.href = 'app.html';
      } catch (err) {
        errorDiv.textContent = err.message || 'Erro ao fazer login';
        errorDiv.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    });

    // Toggle visibilidade da senha
    document.getElementById('toggle-senha').addEventListener('click', () => {
      const input = document.getElementById('senha');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
